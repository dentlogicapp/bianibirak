# BiAniBirak - uretim compose (0B: frontend + backend + postgres)
# PAYLASILAN Caddy modeli (Yol A): kendi Caddy'miz YOK; notlar_caddy TLS + proxy yapar.
# Konteynerler host'a PORT PUBLISH ETMEZ; Caddy konteyner ADIYLA erisir.
#
# UC SINIR:
#  - AG IZOLASYONU: postgres YALNIZ private "bianibirak_ic" (internal) aginda; notlar_default'a
#    KONMAZ -> Notlar da, paylasilan Caddy de DB'yi goremez. backend her iki agda (Caddy erissin
#    + DB'ye ulassin). frontend yalniz notlar_default'ta.
#  - DB IZOLASYONU: ayri bianibirak-postgres konteyneri + ayri kimlik + ayri named volume;
#    host'a port YOK.
#  - HOST-SCOPED CEREZ: backend auth cerezi host-only (CerezYardimcisi); ayni-origin /api ile
#    uyumlu (Caddy handle /api/* -> backend; Asama 8).
#
# ALIAS CAKISMASI: Notlar Caddy'si upstream'leri CIPLAK adla cagirdigi icin servis adlarimiz
# "bianibirak-*" ile benzersiz (frontend/backend/postgres alias cakismasi YOK).

services:
  bianibirak-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bianibirak-frontend:latest
    container_name: bianibirak-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - paylasilan
    # "ports:" YOK - erisim yalniz notlar_caddy uzerinden.

  bianibirak-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bianibirak-backend:latest
    container_name: bianibirak-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=bianibirak-postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=bianibirak
      - Jwt__Audience=bianibirak
      - Jwt__GecerlilikGun=7
      # Web Push (Asama 10-A). Degerler sunucudaki .env dosyasindan gelir;
      # gizli anahtarlar repoya GIRMEZ, yalniz referans burada durur.
      - Vapid__PublicKey=${VAPID_PUBLIC_KEY}
      - Vapid__PrivateKey=${VAPID_PRIVATE_KEY}
      - Vapid__Subject=${VAPID_SUBJECT}
      - Depolama__Kok=/veri/medya
    volumes:
      # Gorseller KALICI olmali - container yeniden kurulunca ucmasin.
      - bianibirak_medya:/veri/medya
    depends_on:
      bianibirak-postgres:
        condition: service_healthy
    networks:
      - paylasilan   # Caddy /api/* -> bianibirak-backend:8080 (Asama 8)
      - ic           # postgres'e erisim
    # "ports:" YOK.

  bianibirak-postgres:
    image: postgres:16-alpine
    container_name: bianibirak-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - bianibirak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ic
    # "ports:" YOK - host'a acilmaz (DB izolasyonu).

networks:
  paylasilan:
    external: true
    name: notlar_default
  ic:
    name: bianibirak_ic
    internal: true

volumes:
  bianibirak_pgdata:
    name: bianibirak_pgdata
  bianibirak_medya:
    name: bianibirak_medya
